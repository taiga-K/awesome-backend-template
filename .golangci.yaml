# 有効にするリンター一覧
linters:
  enable:
    - errcheck      # 未チェックのエラーを検出
    - gosimple      # より簡潔に書けるコードを検出（staticcheck サブセット）
    - govet         # go vet 相当の疑わしい構文を検出
    - ineffassign   # 無効な代入（使われない変数への代入）を検出
    - staticcheck   # バグ・パフォーマンス・スタイルの静的解析
    - unused        # 未使用の定数・変数・関数・型を検出
    - gofmt         # コードフォーマットのチェック
    - goimports     # import の整理・整列
    - misspell      # スペルミスを検出
    - unconvert     # 不要な型変換を検出
    - unparam       # 未使用の関数パラメータを検出
    - gosec         # セキュリティ脆弱性を検出（SQLインジェクション、弱い暗号など）
    - bidichk       # 双方向Unicode文字によるTrojan Source攻撃を検出
    - errorlint     # Go 1.13+のエラーラッピング・errors.Is/Asの正しい使い方を検証
    - bodyclose     # HTTPレスポンスボディのクローズ漏れを検出
    - noctx         # HTTPリクエストにcontext.Contextが渡っていない場合を検出
    - usestdlibvars # 標準ライブラリの定数・変数使用を推奨（例: http.StatusOK）

# リンター個別の設定
linters-settings:
  errcheck:
    # 型アサーション (a := b.(MyStruct)) の未チェックも検出する
    check-type-assertions: true
  govet:
    # 変数シャドウイング（内側スコープでの上書き）を検出する
    check-shadowing: true

# 問題のフィルタリング設定
issues:
  # false: デフォルトの除外パターンを使用しない（より厳密に指摘する）
  exclude-use-default: false