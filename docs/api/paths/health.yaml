get:
  operationId: getHealth
  summary: ヘルスチェックを取得する
  description: 内部 API の稼働状態と基本情報を返します。
  tags:
    - System
  responses:
    '200':
      description: 正常に状態を取得した
      content:
        application/json:
          schema:
            $ref: ../components/schemas/health-response.yaml
    '401':
      description: 認証情報が不足しているか無効
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '503':
      description: 一時的に状態を取得できない
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
